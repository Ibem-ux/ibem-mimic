name: mimic
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.1.0
  pointycastle: ^3.8.0
  sqflite: ^2.3.0
  local_auth: ^2.0.0
  camera_android_camerax: ^0.7.2+1
  camera: ^0.12.0+1
  flutter_riverpod: ^2.4.0
  shared_preferences: ^2.2.2
  just_audio: ^0.9.36
  just_audio_web: ^0.4.0
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  path: ^1.9.0
  record: ^7.0.0
  uuid: ^4.0.0
  photo_view: ^0.14.0
  sensors_plus: ^7.0.0
  share_plus: ^10.1.4
  crypto: ^3.0.6
  file_picker: 10.3.10
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  package_info_plus: ^8.0.0
  photo_manager: ^3.0.0
  wechat_assets_picker: ^9.0.0
  video_player: ^2.8.2
  chewie: ^1.7.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.1
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#080A0F"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#080A0F"
  image: "assets/splash/splash_logo.png"
  android: true
  ios: false
  web: false
  android_12:
    color: "#080A0F"
    image: "assets/splash/splash_logo.png"
